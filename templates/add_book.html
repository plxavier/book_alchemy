{% extends "base.html" %}

{% block title %}Add Book - Book Alchemy{% endblock %}

{% block content %}
<h1>📖 Add a New Book</h1>

<div class="card">
    <form method="POST">
        <div class="form-group">
            <label for="title">Title *</label>
            <input type="text" id="title" name="title" placeholder="Enter book title" required>
        </div>

        <div class="form-group">
            <label for="author_id">Author *</label>
            <select id="author_id" name="author_id" required>
                <option value="">Select an author</option>
                {% for author in authors %}
                    <option value="{{ author.id }}">{{ author.name }}</option>
                {% endfor %}
            </select>
            <small style="color: #6c757d; display: block; margin-top: 5px;">
                <a href="{{ url_for('add_author') }}">➕ Add a new author</a>
            </small>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="isbn">ISBN</label>
                <input type="text" id="isbn" name="isbn" placeholder="Enter ISBN">
            </div>
            <div class="form-group">
                <label for="publication_year">Publication Year</label>
                <input type="number" id="publication_year" name="publication_year" placeholder="e.g., 2020">
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="genre">Genre</label>
                <input type="text" id="genre" name="genre" placeholder="e.g., Fiction">
            </div>
            <div class="form-group">
                <label for="pages">Pages</label>
                <input type="number" id="pages" name="pages" placeholder="e.g., 250">
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="rating">Rating (1-5)</label>
                <select id="rating" name="rating">
                    <option value="">Select rating</option>
                    <option value="1">⭐ 1</option>
                    <option value="2">⭐⭐ 2</option>
                    <option value="3">⭐⭐⭐ 3</option>
                    <option value="4">⭐⭐⭐⭐ 4</option>
                    <option value="5">⭐⭐⭐⭐⭐ 5</option>
                </select>
            </div>
            <div class="form-group form-check" style="display: flex; align-items: center; gap: 10px; padding-top: 30px;">
                <input type="checkbox" id="read_status" name="read_status">
                <label for="read_status" style="margin: 0;">I have read this book</label>
            </div>
        </div>

        <div class="form-group">
            <label for="notes">Notes</label>
            <textarea id="notes" name="notes" placeholder="Add any notes about this book..."></textarea>
        </div>

        <div style="display: flex; gap: 10px; flex-wrap: wrap; margin-top: 20px;">
            <button type="submit" class="btn btn-success">📖 Add Book</button>
            <a href="{{ url_for('books') }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
