{% extends "base.html" %}

{% block title %}Add Author - Book Alchemy{% endblock %}

{% block content %}
<h1>✍️ Add a New Author</h1>

<div class="card">
    <form method="POST">
        <div class="form-group">
            <label for="name">Name *</label>
            <input type="text" id="name" name="name" placeholder="Enter author's full name" required>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="birth_year">Birth Year</label>
                <input type="number" id="birth_year" name="birth_year" placeholder="e.g., 1950">
            </div>
            <div class="form-group">
                <label for="death_year">Death Year</label>
                <input type="number" id="death_year" name="death_year" placeholder="e.g., 2020">
            </div>
        </div>

        <div class="form-group">
            <label for="nationality">Nationality</label>
            <input type="text" id="nationality" name="nationality" placeholder="e.g., American">
        </div>

        <div style="display: flex; gap: 10px; flex-wrap: wrap; margin-top: 20px;">
            <button type="submit" class="btn btn-success">✍️ Add Author</button>
            <a href="{{ url_for('authors') }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
